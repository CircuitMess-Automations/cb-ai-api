name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy
        run: |
          gcloud functions deploy cb-ai-api --gen2 --region=europe-west3 --runtime=nodejs22 --source=. --entry-point=api --trigger-http --allow-unauthenticated --memory=256MB --timeout=120s --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" --project=${{ secrets.GCP_PROJECT_ID }}
